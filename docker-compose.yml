services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  chatbot:
    build: .
    depends_on:
      - ollama
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1}
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./data:/app/data
    stdin_open: true
    tty: true

volumes:
  ollama_models:
